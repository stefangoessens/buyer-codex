name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  push:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      convex: ${{ steps.filter.outputs.convex }}
      ios: ${{ steps.filter.outputs.ios }}
      shared: ${{ steps.filter.outputs.shared }}
      shared_platform: ${{ steps.filter.outputs.shared_platform }}
      web: ${{ steps.filter.outputs.web }}
      workers: ${{ steps.filter.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'src/app/**'
              - 'src/components/**'
              - 'src/lib/**'
              - 'next.config.ts'
              - 'instrumentation-client.ts'
              - 'postcss.config.mjs'
              - 'eslint.config.mjs'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'playwright.config.ts'
            convex:
              - 'convex/**'
            shared:
              - 'packages/shared/package.json'
              - 'packages/shared/src/auth.ts'
              - 'packages/shared/src/communication-templates.ts'
              - 'packages/shared/src/contracts.ts'
              - 'packages/shared/src/external-access.ts'
              - 'packages/shared/src/index.ts'
              - 'packages/shared/src/launch-events.ts'
              - 'packages/shared/src/utils.ts'
            shared_platform:
              - 'packages/shared/src/config.ts'
            ios:
              - 'ios/**'
            workers:
              - 'python-workers/**'
              - 'services/extraction/**'
              - 'railway.json'
              - '.env.example'

  web:
    name: Web quality
    needs: changes
    if: |
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.convex == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc -p tsconfig.web.json --noEmit

      - name: Unit tests with coverage gate
        run: pnpm test:coverage

      - name: Build
        run: pnpm build:web
        env:
          NEXT_PUBLIC_APP_URL: https://preview.buyer-codex.local
          NEXT_PUBLIC_CONVEX_URL: https://example.convex.cloud
          NEXT_PUBLIC_POSTHOG_KEY: test-posthog-key
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          NEXT_PUBLIC_SENTRY_DSN: https://examplePublicKey@o0.ingest.sentry.io/0

  convex:
    name: Convex quality
    needs: changes
    if: |
      needs.changes.outputs.convex == 'true' ||
      needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Convex workspace
        run: pnpm --dir convex typecheck

  shared:
    name: Shared package quality
    needs: changes
    if: |
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.shared_platform == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared package
        run: pnpm --dir packages/shared typecheck

  ai:
    name: AI eval harness
    needs: changes
    if: |
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Eval pricing seed fixtures
        run: pnpm eval pricing latest

  ios:
    name: iOS quality
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Test Swift package
        run: |
          cd ios/BuyerCodex
          xcodebuild test \
            -scheme BuyerCodex \
            -destination "platform=iOS Simulator,name=iPhone 16"

  workers:
    name: Worker quality
    needs: changes
    if: needs.changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - python-workers
          - services/extraction
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies and run tests
        run: |
          cd "${{ matrix.workspace }}"
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pytest -q

  e2e:
    name: Web smoke e2e
    needs:
      - changes
      - web
    if: |
      needs.changes.outputs.ci == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.convex == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: pnpm test:e2e

  quality-gates:
    name: Quality gates
    needs:
      - changes
      - web
      - convex
      - shared
      - ai
      - ios
      - workers
      - e2e
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fail when an affected surface gate fails
        env:
          WEB_RESULT: ${{ needs.web.result }}
          CONVEX_RESULT: ${{ needs.convex.result }}
          SHARED_RESULT: ${{ needs.shared.result }}
          AI_RESULT: ${{ needs.ai.result }}
          IOS_RESULT: ${{ needs.ios.result }}
          WORKERS_RESULT: ${{ needs.workers.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          echo "web=$WEB_RESULT"
          echo "convex=$CONVEX_RESULT"
          echo "shared=$SHARED_RESULT"
          echo "ai=$AI_RESULT"
          echo "ios=$IOS_RESULT"
          echo "workers=$WORKERS_RESULT"
          echo "e2e=$E2E_RESULT"

          for result in "$WEB_RESULT" "$CONVEX_RESULT" "$SHARED_RESULT" "$AI_RESULT" "$IOS_RESULT" "$WORKERS_RESULT" "$E2E_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::A required quality gate failed."
              exit 1
            fi
          done

          echo "All required quality gates passed."

  preview-web:
    name: Preview web health
    needs:
      - changes
      - quality-gates
    if: |
      github.event_name == 'pull_request' &&
      vars.PREVIEW_WEB_URL_TEMPLATE != '' &&
      (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.shared == 'true' ||
        needs.changes.outputs.convex == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify preview web health
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/verify-health.mjs \
            --label "web preview" \
            --template "${{ vars.PREVIEW_WEB_URL_TEMPLATE }}" \
            --path "/api/health" \
            --timeout-seconds "900" \
            --interval-seconds "20"

  preview-workers:
    name: Preview worker health
    needs:
      - changes
      - quality-gates
    if: |
      github.event_name == 'pull_request' &&
      vars.PREVIEW_EXTRACTION_URL_TEMPLATE != '' &&
      needs.changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify preview worker health
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node scripts/verify-health.mjs \
            --label "worker preview" \
            --template "${{ vars.PREVIEW_EXTRACTION_URL_TEMPLATE }}" \
            --path "/health" \
            --timeout-seconds "900" \
            --interval-seconds "20"

  preview-ready:
    name: Preview ready
    needs:
      - preview-web
      - preview-workers
      - quality-gates
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fail when preview verification fails
        env:
          PREVIEW_WEB_RESULT: ${{ needs.preview-web.result }}
          PREVIEW_WORKERS_RESULT: ${{ needs.preview-workers.result }}
          QUALITY_RESULT: ${{ needs.quality-gates.result }}
          PREVIEW_WEB_TEMPLATE: ${{ vars.PREVIEW_WEB_URL_TEMPLATE }}
          PREVIEW_EXTRACTION_TEMPLATE: ${{ vars.PREVIEW_EXTRACTION_URL_TEMPLATE }}
        run: |
          echo "quality=$QUALITY_RESULT"
          echo "preview-web=$PREVIEW_WEB_RESULT"
          echo "preview-workers=$PREVIEW_WORKERS_RESULT"

          for result in "$QUALITY_RESULT" "$PREVIEW_WEB_RESULT" "$PREVIEW_WORKERS_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::Preview workflow is not ready for promotion."
              exit 1
            fi
          done

          {
            echo "## Preview verification"
            echo ""
            echo "- Quality gates: $QUALITY_RESULT"
            echo "- Web preview template configured: $([ -n \"$PREVIEW_WEB_TEMPLATE\" ] && echo yes || echo no)"
            echo "- Worker preview template configured: $([ -n \"$PREVIEW_EXTRACTION_TEMPLATE\" ] && echo yes || echo no)"
            echo "- Web preview result: $PREVIEW_WEB_RESULT"
            echo "- Worker preview result: $PREVIEW_WORKERS_RESULT"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Preview workflow is ready for promotion."
